<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dataset Demo - EDA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <h1>Hubble Space Telescope 3D-HST Dataset</h1>
    <nav>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Summary</h2>
      <div id="eda-summary">
          <!-- display plot images -->
          <img src="assets/plots/hst/av.png" alt="Visual Extension" class="eda-plot">
          <img src="assets/plots/hst/beta.png" alt="UV slope" class="eda-plot">
          <img src="assets/plots/hst/chi2.png" alt="Chi-squared distribution" class="eda-plot">
          <img src="assets/plots/hst/jh_mag.png" alt="J-H Color" class="eda-plot">
          <img src="assets/plots/hst/lmass.png" alt="Mass distribution" class="eda-plot">
          <img src="assets/plots/hst/log10_l_ir.png" alt="Log10 L_IR distribution" class="eda-plot">
          <img src="assets/plots/hst/log10_sfr.png" alt="Log10 SFR distribution" class="eda-plot">
          <img src="assets/plots/hst/log10_sfr_ir.png" alt="Log10 SFR_IR distribution" class="eda-plot">
          <img src="assets/plots/hst/log10_sfr_uv.png" alt="Log10 SFR_UV distribution" class="eda-plot">
          <img src="assets/plots/hst/lssfr.png" alt="Log Specific SFR distribution" class="eda-plot">
          <img src="assets/plots/hst/sky_distribution.png" alt="Sky distribution" class="eda-plot">
          <img src="assets/plots/hst/z_best.png" alt="Redshift distribution" class="eda-plot">
          <img src="assets/plots/hst/z_spec.png" alt="Spectroscopic redshift distribution" class="eda-plot">
          <img src="assets/plots/hst/z_peak_grism.png" alt="Grism redshift distribution" class="eda-plot">
          <img src="assets/plots/hst/z_peak_phot.png" alt="Photometric redshift distribution" class="eda-plot">

      </div>
    </section>


  </main>

  <!--<script src="app.js"></script>-->

    <!--loadEDA();-->
  <!--</script>-->
</body>
</html>
